---
# ── 1. System update ──────────────────────────────────────────────────────────

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - ufw
      - python3-pip
      - git
      - htop
      - unzip
    state: present

# ── 2. Deploy user ────────────────────────────────────────────────────────────

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    create_home: true

- name: Allow deploy user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/deploy
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: Create .ssh directory for deploy user
  ansible.builtin.file:
    path: "{{ deploy_home }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: Copy ubuntu user authorized_keys to deploy user
  ansible.builtin.copy:
    src: /home/ubuntu/.ssh/authorized_keys
    dest: "{{ deploy_home }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"

# ── 3. Docker CE (ARM64) ──────────────────────────────────────────────────────

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository (arm64)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker CE and Compose plugin
  ansible.builtin.apt:
    update_cache: true
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true

# ── 4. Block volume mount ─────────────────────────────────────────────────────

- name: Check if data device already has a filesystem
  ansible.builtin.command:
    cmd: blkid -s TYPE -o value {{ data_device }}
  register: blkid_result
  failed_when: false
  changed_when: false

- name: Create ext4 filesystem on data volume (first boot only)
  community.general.filesystem:
    fstype: ext4
    dev: "{{ data_device }}"
  when: blkid_result.stdout == ""

- name: Create mount point
  ansible.builtin.file:
    path: "{{ data_mount }}"
    state: directory
    mode: "0755"

- name: Mount data volume persistently
  ansible.posix.mount:
    path: "{{ data_mount }}"
    src: "{{ data_device }}"
    fstype: ext4
    opts: defaults,nofail
    state: mounted

- name: Create persistent data subdirectories
  ansible.builtin.file:
    path: "{{ data_mount }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  loop:
    - postgres
    - nats
    - otelcol
    - prometheus/data
    - grafana/data
    - grafana/provisioning

# ── 5. UFW firewall ───────────────────────────────────────────────────────────

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  # HTTP/HTTPS are intentionally omitted — Cloudflare Tunnel handles all ingress.
  # cloudflared opens an outbound connection to Cloudflare; no inbound ports needed.

- name: Enable UFW
  community.general.ufw:
    state: enabled
  notify: Reload UFW

# ── 6. Sysctl tuning ──────────────────────────────────────────────────────────

- name: Increase file descriptor limit
  ansible.posix.sysctl:
    name: fs.file-max
    value: "524288"
    state: present
    reload: true

- name: Increase TCP backlog
  ansible.posix.sysctl:
    name: net.core.somaxconn
    value: "4096"
    state: present
    reload: true
