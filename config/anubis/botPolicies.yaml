# Anubis bot policies for sukhi-fedi.
#
# 守る対象は二層:
#   /check     … 加入・ログインの通り道(従来)。メールのコード入力も
#                いまはこのページの上で行われる ─ 店先(/login /signup)
#                は素通しのまま、PoW は遷移の中に隠れる。
#   */email/*  … 実際にメールが出る XHR。/check を通った browser は
#                cookie で素通り、cookie 無しの直叩き(bot/curl)は
#                ここで止まる ─ 「メールは Anubis の後」の実体。
#                第二の壁として per-address の Hammer レート制限が
#                gateway 側に残っている。
#
# ActivityPub 配送 (`/inbox`, `/users/*`, `/.well-known/*`,
# `/nodeinfo/*`) と SPA の API/OAuth は素通し ─ ここを止めると
# federation か signup が壊れる。ログイン済みの管理面
# (/settings/email|reauth) も素通し: session cookie + レート制限が
# 既にあり、Anubis cookie が切れただけの常連を弾きたくない。
#
# シンプルさを保つために `import:` は使わず、必要なルールだけを並べる。
# 詳しい背景は docs/anubis.md を読む。

bots:
  # ── federation は止めない(優先) ────────────────────────────────────
  - name: activitypub-inbox
    path_regex: ^/(inbox|users/[^/]+(/inbox|/outbox|/followers|/following|/featured|/notes/.*)?)$
    action: ALLOW

  - name: webfinger-and-nodeinfo
    path_regex: ^/\.well-known/(webfinger|nodeinfo)$
    action: ALLOW

  - name: nodeinfo-v2
    path_regex: ^/nodeinfo/2\.\d+$
    action: ALLOW

  # ── SPA fetch / OAuth は JS challenge を解けないので素通し ───────────
  - name: api-and-oauth
    path_regex: ^/(api|oauth)/
    action: ALLOW

  - name: static-assets
    path_regex: ^/(static|uploads|_app|favicon\.ico)
    action: ALLOW

  - name: health
    path_regex: ^/up$
    action: ALLOW

  # /metrics is unauthenticated PromEx output — keep it off the public
  # edge. (kamal-proxy / internal scrapers reach the gateway directly,
  # not through Anubis.) Must come before default-allow.
  - name: metrics-deny
    path_regex: ^/metrics$
    action: DENY

  - name: login-pages
    path_regex: ^/(login|logout|signup)$
    action: ALLOW

  # ── 守る対象 ────────────────────────────────────────────────────────
  - name: check-gate
    path_regex: ^/check$
    action: CHALLENGE

  - name: signup-email-gate
    path_regex: ^/signup/email/(request|confirm)$
    action: CHALLENGE

  - name: login-email-gate
    path_regex: ^/login/email(/request)?$
    action: CHALLENGE

  # ── 既定: それ以外は素通し ──────────────────────────────────────────
  - name: default-allow
    path_regex: .
    action: ALLOW

dnsbl: false
