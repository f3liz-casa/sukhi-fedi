# Anubis bot policies for sukhi-fedi.
#
# 守る対象は `/check` だけ。ログインも加入も ─ そして 2026-06-13
# からはメールの 6 桁コードの送信・入力も ─ ここを経由する。
#
# 教訓 (2026-06-13 深夜): メール送信 XHR (`*/email/*`) を CHALLENGE
# にしてはいけない。/check を解いた直後の browser でも、fetch の
# POST は challenge され直し(しかも cookie が消えて) reload ループに
# なった。「SPA の fetch は JS challenge を解けない」 ─ 下に昔から
# 書いてあるこの行は、XHR には cookie があっても効かない、の意味
# でもあった。メール直叩き(bot/curl)への弁は gateway 側の IP 毎
# レート制限 + per-address レート制限が持つ。
#
# ActivityPub 配送 (`/inbox`, `/users/*`, `/.well-known/*`,
# `/nodeinfo/*`) と SPA の API/OAuth は素通し ─ ここを止めると
# federation か signup が壊れる。
#
# シンプルさを保つために `import:` は使わず、必要なルールだけを並べる。
# 詳しい背景は docs/anubis.md を読む。

bots:
  # ── federation は止めない(優先) ────────────────────────────────────
  - name: activitypub-inbox
    path_regex: ^/(inbox|users/[^/]+(/inbox|/outbox|/followers|/following|/featured|/notes/.*)?)$
    action: ALLOW

  - name: webfinger-and-nodeinfo
    path_regex: ^/\.well-known/(webfinger|nodeinfo)$
    action: ALLOW

  - name: nodeinfo-v2
    path_regex: ^/nodeinfo/2\.\d+$
    action: ALLOW

  # ── SPA fetch / OAuth は JS challenge を解けないので素通し ───────────
  - name: api-and-oauth
    path_regex: ^/(api|oauth)/
    action: ALLOW

  - name: static-assets
    path_regex: ^/(static|uploads|_app|favicon\.ico)
    action: ALLOW

  - name: health
    path_regex: ^/up$
    action: ALLOW

  # /metrics is unauthenticated PromEx output — keep it off the public
  # edge. (kamal-proxy / internal scrapers reach the gateway directly,
  # not through Anubis.) Must come before default-allow.
  - name: metrics-deny
    path_regex: ^/metrics$
    action: DENY

  - name: login-pages
    path_regex: ^/(login|logout|signup)$
    action: ALLOW

  # ── 守る対象 ────────────────────────────────────────────────────────
  - name: check-gate
    path_regex: ^/check$
    action: CHALLENGE

  # ── 既定: それ以外は素通し ──────────────────────────────────────────
  - name: default-allow
    path_regex: .
    action: ALLOW

dnsbl: false
