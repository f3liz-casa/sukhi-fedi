#
# Kamal deployment config for sukhi-fedi.
#
# ── Mental model ────────────────────────────────────────────────────────────
# Kamal is "one main image, scale by listing servers". sukhi-fedi has six
# images (gateway / delivery / bun / api / postgres / nats), so:
#
#   - `gateway` is the main `service` — it's the public HTTP entry point
#     and the one you'd naturally scale horizontally first. Kamal-proxy
#     terminates TLS in front of it and load-balances across `servers.web.hosts`.
#
#   - Everything else lives under `accessories`. Each accessory can move to
#     a different host by changing its `host:` field — that's the "scale by
#     adding servers" axis. Examples once you grow:
#       accessories:
#         postgres:
#           host: db1.internal      # move DB to dedicated box
#         delivery:
#           host: worker1.internal  # delivery on its own host
#
# ── Container networking ────────────────────────────────────────────────────
# Kamal puts everything in a Docker network named `kamal`. Containers
# reach each other by their Kamal-prefixed name: `sukhi-fedi-postgres`,
# `sukhi-fedi-nats`, etc. The env vars below reflect that.
#
# Distributed-Erlang between gateway and api requires stable hostnames
# (`elixir` and `api`) — set via `options: hostname:` so the BEAM node
# name (`gateway@elixir`, `api@api`) resolves correctly.
#
# ── Before first deploy ─────────────────────────────────────────────────────
# 1. Wait for cloud-init to finish installing Docker on the box:
#       ssh rocky@217.142.242.103 'docker --version'
#    succeeds → ready.
# 2. Set the env vars referenced in `.kamal/secrets` in your shell or
#    in a tool like direnv / 1Password CLI before running deploy.
# 3. No registry PAT needed ─ images are built on the box (bin/build-on-box.sh)
#    and pushed to the box-local registry (127.0.0.1:5000). Put its basic-auth
#    pass in `.kamal/secrets` as `REGISTRY_PASSWORD=` (htpasswd user `sukhi`).
# 4. Generate the Anubis cookie-signing key once and put it in
#    `.kamal/secrets` as `ANUBIS_ED25519_KEY=`:
#       openssl rand -hex 32
# 5. DNS: A record `sukhi.f3liz.casa` → 217.142.242.103.
# 6. First-time bring-up sequence:
#       kamal server bootstrap         # Docker on box (no-op if already there)
#       kamal proxy boot               # kamal-proxy + Let's Encrypt
#       kamal accessory boot all       # postgres, nats, bun, delivery, api, gateway
#       kamal accessory boot nats-bootstrap   # one-shot: creates OUTBOX stream
#       kamal deploy --skip-push       # Anubis (web role)
# 7. Roll a new gateway version (after `bin/build-on-box.sh gateway`):
#       kamal accessory reboot gateway     # picks up the new `:v0` digest
#    Roll Anubis (rare):
#       kamal deploy --skip-push           # pulls techarohq/anubis:latest
#
# ── Multi-host scaling ──────────────────────────────────────────────────────
# When you add a second box, run Tailscale on both, then change the
# host IPs in this file to the `100.x.y.z` tailnet addresses. Kamal
# (and the gateway↔postgres traffic) will ride tailscale0 instead of
# the public internet. No other config change needed.

service: sukhi-fedi

# ── Topology ────────────────────────────────────────────────────────────────
# Kamal's "web role" is whichever container the proxy points at. We
# put **Anubis** there ─ it terminates the path that needs PoW, and
# forwards everything else (federation, API, OAuth, static) to the
# gateway behind it. The actual Elixir gateway lives as an accessory
# (see `accessories.gateway` below), still on the kamal docker network
# so distributed Erlang with the api accessory keeps working.
#
# Workflow note: rolling a new gateway version is now
#   kamal accessory reboot gateway
# not
#   kamal deploy --version=<tag>
# Anubis itself is pinned to `:latest`; bump rarely via
#   kamal deploy --skip-push   # no --version, pulls the latest anubis
image: sukhi-fedi-anubis

# kamal は build しない(bin/build-on-box.sh が箱で焼く → deploy は --skip-push /
# accessory reboot)。config 検証で arch だけ要求されるので置く。箱は arm64。
builder:
  arch: arm64

# 箱の private registry に相乗り(techo が立てた 127.0.0.1:5000 の registry:2)。
# user は sukhi で分ける ─ htpasswd に techo とは別エントリ。registry:2 の
# basic-auth に repo 単位の ACL は無いので、分離は「資格情報を分ける」意味。
# 127.0.0.1 は docker が既定で insecure 許可するので daemon 設定は不要。kamal は
# pull 前に docker login するので basic-auth を渡す。
# 公開 multi-arch image は引き続き release.yml が ghcr に出す ─ こっちは
# 「自分の箱に出す」専用(bin/build-on-box.sh で arm64 単一を焼く)。
registry:
  server: 127.0.0.1:5000
  username: sukhi
  password:
    - REGISTRY_PASSWORD

# Rocky Linux box; cloud-init provisions the `rocky` user with sudo
# + docker group. Kamal defaults to root — override here.
ssh:
  user: rocky

# ── Container log rotation (host-level) ──────────────────────────────────────
# The json-file driver is unbounded by default — a disk-fill risk on a small
# box. Cap it once for *every* container (the gateway/delivery accessories
# included, which a per-role `logging:` here would miss) by installing the
# Docker daemon default on the host, then restarting docker:
#   sudo cp infra/docker-daemon.json /etc/docker/daemon.json
#   sudo systemctl restart docker && kamal deploy
# The rotated files at /var/lib/docker/containers/*/*-json.log* are what the
# backup picks up to keep logs off-host (see infra/backup/README.md).

# ── Servers ────────────────────────────────────────────────────────────────
# `web` is now the Anubis container. It listens on 8080 inside the
# kamal network; kamal-proxy terminates TLS on 443 and forwards there.
servers:
  web:
    hosts:
      - 217.142.242.103
    options:
      hostname: anubis
      network-alias: anubis
      memory: 256m
      cpus: "0.3"

# ── Proxy / TLS ────────────────────────────────────────────────────────────
# kamal-proxy → anubis (8080) → gateway (4000).
# The healthcheck path is in Anubis's ALLOW list (`/nodeinfo/2.x`) so it
# transitively proves the gateway is up too.
#
# TLS: Cloudflare Origin CA 証明書を使う（Let's Encrypt から移行）。f3liz.casa は
# Cloudflare 越し（orange）。LE はチャレンジが CF に吸われるので、CF 越しの更新が
# いずれ失敗する（橙色のまま放置すると 8月の renewal で切れる）。Origin CA(最長
# 15年・ACME 不要) に寄せると Full (Strict) が安定して通り、更新の心配も消える。
# 証明書(*.f3liz.casa の 1 枚)は config/tls/ に置き、.kamal/secrets で $(cat ...)。
# 適用は `kamal deploy --skip-push`（web/anubis 再登録時に証明書が upload され
# proxy に登録される＝普段 Anubis を回すのと同じコマンド）。最後に CF を Full (Strict)。
proxy:
  ssl:
    certificate_pem: TLS_CERT
    private_key_pem: TLS_KEY
  host: sukhi.f3liz.casa
  app_port: 8080
  healthcheck:
    path: /nodeinfo/2.1
    interval: 5
    timeout: 5

# ── Anubis env (the web role) ──────────────────────────────────────────────
env:
  clear:
    BIND: ":8080"
    DIFFICULTY: "4"
    METRICS_BIND: ":9090"
    # botPolicies + imprint は image にビルド時に焼き込まれている
    # (config/anubis/Dockerfile)。設定を変えたいときは config/anubis/
    # を編集してタグを切ると CI が新しい anubis image を出す。
    POLICY_FNAME: /data/cfg/botPolicies.yaml
    IMPRINT_FILE: /data/cfg/imprint.md
    SERVE_ROBOTS_TXT: "true"
    TARGET: http://sukhi-fedi-gateway:4000
    COOKIE_DOMAIN: sukhi.f3liz.casa
    COOKIE_PARTITIONED: "true"
    # kamal-proxy doesn't set X-Real-Ip, so Anubis must use the TCP
    # connection's remote address instead. Without this, every request
    # fails with "[misconfiguration] X-Real-Ip header is not set".
    USE_REMOTE_ADDRESS: "true"
  # ANUBIS_ED25519_KEY (32-byte hex) は .kamal/secrets に書いてから
  # 下の secret: にも入れて、コンテナ再起動を跨いで cookie が生き残る
  # ようにする。無くても起動はするが、再起動のたびに鍵が新しくなって
  # 全ユーザが PoW 再走になる。
  #   secret:
  #     - ANUBIS_ED25519_KEY

# ── Accessories ────────────────────────────────────────────────────────────
# Each `host:` can be a different IP once you grow. For now they share
# the primary VPS with the gateway.
accessories:
  # ── Gateway (Elixir) ─────────────────────────────────────────────────────
  # Was the `web` role; now an accessory living behind Anubis. Same
  # image, same env, same Erlang cluster setup. Roll a new version
  # with `kamal accessory reboot gateway` — the image tag is `:v0`
  # rolling, so the latest semver-tagged release picks up.
  gateway:
    image: 127.0.0.1:5000/sukhi-fedi-gateway:v0
    host: 217.142.242.103
    env:
      clear:
        DB_HOST: sukhi-fedi-postgres
        DB_USER: sukhi
        DB_NAME: sukhi_fedi
        DB_POOL_SIZE: "15"
        NATS_HOST: sukhi-fedi-nats
        NATS_PORT: "4222"
        RELEASE_DISTRIBUTION: sname
        RELEASE_NODE: gateway@elixir
        PLUGIN_NODES: api@api
        DOMAIN: sukhi.f3liz.casa
        INSTANCE_TITLE: sukhi.f3liz.casa
        ENABLED_ADDONS: all
        DISABLE_ADDONS: nodeinfo_monitor
        ERL_FULLSWEEP_AFTER: "20"
        ERL_FLAGS: "+S 2:2 +SDcpu 2:2 +SDio 4 +MBas aobf +MHas aobf"
        # Object storage (rustfs accessory below). media.ex writes
        # PutObject here; router serve_upload/2 proxies GetObject back
        # out at /uploads/<key>. URLs in the DB stay `/uploads/<key>`.
        S3_ENDPOINT: http://sukhi-fedi-rustfs:9000
        S3_BUCKET: media
        S3_REGION: us-east-1
        # Transactional mail (verification / login codes) via OCI Email
        # Delivery, Osaka region. 587 = STARTTLS; the Mailer verifies the
        # server cert. MAIL_FROM must be an *approved sender* in the same
        # region, and SMTP_USERNAME/PASSWORD below come from an IAM
        # user's "SMTP credentials" (see .kamal/secrets.example).
        SMTP_HOST: smtp.email.ap-osaka-1.oci.oraclecloud.com
        SMTP_PORT: "587"
        MAIL_FROM: no-reply@sukhi.f3liz.casa
      secret:
        - DB_PASS
        - ERLANG_COOKIE
        - SECRET_KEY_BASE
        - S3_ACCESS_KEY_ID
        - S3_SECRET_ACCESS_KEY
        - SMTP_USERNAME
        - SMTP_PASSWORD
    options:
      # `elixir` hostname is still required: gateway's BEAM is
      # `gateway@elixir`. Other containers reach it via the
      # kamal-prefixed name `sukhi-fedi-gateway` (no extra alias to
      # avoid colliding with the previous `web` role during migration).
      hostname: elixir
      memory: 2g
      cpus: "1.5"
      # Host dir for live static overrides. Anything placed under
      # /var/lib/sukhi-fedi/static/ on the box is served at the same
      # path before falling back to the image-baked priv/static. Means
      # CSS / SPA tweaks can land via plain scp ─ no image rebuild,
      # no container reboot. See docs/static-override.md.
      volume: "/var/lib/sukhi-fedi/static:/app/priv/static-override:ro"

  postgres:
    image: postgres:16-alpine
    host: 217.142.242.103
    # Bind to loopback, not 0.0.0.0 — the app containers reach postgres by
    # its kamal network alias, so the host port is only for local ops and
    # must not be internet-reachable. (Docker's publish bypasses firewalld,
    # so a bare `5432` would expose it regardless of the box firewall.)
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: sukhi
        POSTGRES_DB: sukhi_fedi
      secret:
        - POSTGRES_PASSWORD
    cmd: >-
      postgres
      -c shared_buffers=2GB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
      -c effective_cache_size=6GB
      -c wal_buffers=16MB
      -c max_wal_size=1GB
      -c min_wal_size=256MB
    directories:
      - data:/var/lib/postgresql/data
    options:
      network-alias: postgres
      memory: 3g
      cpus: "1"
      health-cmd: pg_isready -U sukhi
      health-interval: 5s
      health-timeout: 5s
      health-retries: "5"

  nats:
    image: nats:2-alpine
    host: 217.142.242.103
    # Loopback only — NATS is unauthenticated and carries the federation
    # OUTBOX + DOMAIN_EVENTS bus; it must never be internet-reachable. App
    # containers reach it by network alias. (See also: add token/nkey auth
    # to the nats cmd + every client as a follow-up.)
    port: "127.0.0.1:4222:4222"
    cmd: --jetstream --store_dir /data --http_port 8222
    directories:
      - data:/data
    options:
      network-alias: nats
      memory: 256m
      cpus: "0.5"
      health-cmd: wget -qO- http://localhost:8222/healthz || exit 1
      health-interval: 5s

  # One-shot: creates the OUTBOX JetStream. Re-run after fresh `nats`
  # accessory boot. Re-running on existing stream is a no-op.
  #   kamal accessory boot nats-bootstrap
  #   kamal accessory remove nats-bootstrap   # optional cleanup
  nats-bootstrap:
    image: 127.0.0.1:5000/sukhi-fedi-nats-bootstrap:v0
    host: 217.142.242.103
    env:
      clear:
        NATS_URL: nats://sukhi-fedi-nats:4222

  # ── rustfs (S3-compatible object store for media) ─────────────────────────
  # MinIO 代替の Rust 実装。S3 v4 で gateway から PutObject / GetObject。
  # gateway accessory の S3_ENDPOINT がこの container を指す。
  # Data は kamal の directories: で host に bind されるので、container を
  # 再作成しても残る。Bucket は自動では作られない ─ gateway 起動時に
  # SukhiFedi.Addons.Media.Bootstrap が ensure_bucket を実行する。
  #
  # 初回 boot 前のセットアップ(これを忘れると Permission denied で落ちる):
  #   kamal accessory boot rustfs    # kamal が $PWD/sukhi-fedi-rustfs/data を作る
  #   ssh rocky@<host> 'sudo chown -R 10001:10001 ~/sukhi-fedi-rustfs/data'
  #   kamal accessory restart rustfs
  # rustfs container は UID 10001 で動くので、kamal が rocky で作った
  # bind-mount dir のままでは書けない。
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.5
    host: 217.142.242.103
    env:
      clear:
        RUSTFS_VOLUMES: /data
        RUSTFS_ADDRESS: ":9000"
        RUSTFS_CONSOLE_ENABLE: "false"
      secret:
        - RUSTFS_ACCESS_KEY
        - RUSTFS_SECRET_KEY
    directories:
      - data:/data
    options:
      network-alias: rustfs
      memory: 512m
      cpus: "0.5"

  # RETIRED 2026-06-12 (v0.3.0): the native SukhiFedi.Fedi service inside
  # the gateway serves all fedify.*.v1 subjects now. The container is
  # *stopped*, not removed — rollback is `kamal accessory start bun`
  # (both share the fedify-workers queue group, so coexistence is safe).
  # Drop this whole block once the native service has burned in.
  bun:
    image: 127.0.0.1:5000/sukhi-fedi-bun:v0
    host: 217.142.242.103
    env:
      clear:
        NATS_URL: nats://sukhi-fedi-nats:4222
        ENABLED_ADDONS: all
        DISABLE_ADDONS: nodeinfo_monitor
    options:
      memory: 512m
      cpus: "0.5"

  # Outbound federation worker. Talks to gateway only via postgres + nats.
  # First service to scale horizontally when delivery queue lag is
  # consistently >0 — change `host:` to a list of multiple hosts.
  delivery:
    image: 127.0.0.1:5000/sukhi-fedi-delivery:v0
    host: 217.142.242.103
    env:
      clear:
        DOMAIN: sukhi.f3liz.casa
        DB_HOST: sukhi-fedi-postgres
        DB_USER: sukhi
        DB_NAME: sukhi_fedi
        DB_POOL_SIZE: "8"
        NATS_HOST: sukhi-fedi-nats
        NATS_PORT: "4222"
        METRICS_PORT: "4001"
        OBAN_DELIVERY_CONCURRENCY: "10"
        OBAN_FEDERATION_CONCURRENCY: "4"
        FINCH_POOL_SIZE: "50"
        FINCH_POOL_COUNT: "4"
        ERL_FLAGS: "+S 2:2 +SDcpu 2:2 +SDio 4 +MBas aobf +MHas aobf"
        ERL_FULLSWEEP_AFTER: "20"
      secret:
        - DB_PASS
    options:
      memory: 1500m
      cpus: "1"

  # Distributed-Erlang plugin node. Hostname MUST be `api` so the
  # node name `api@api` resolves from the gateway via `PLUGIN_NODES`.
  api:
    image: 127.0.0.1:5000/sukhi-fedi-api:v0
    host: 217.142.242.103
    env:
      clear:
        RELEASE_DISTRIBUTION: sname
        RELEASE_NODE: api@api
        DOMAIN: sukhi.f3liz.casa
        INSTANCE_TITLE: sukhi.f3liz.casa
        ENABLED_ADDONS: all
        DISABLE_ADDONS: nodeinfo_monitor
      secret:
        - ERLANG_COOKIE
    options:
      hostname: api
      network-alias: api
      memory: 768m
      cpus: "0.5"
