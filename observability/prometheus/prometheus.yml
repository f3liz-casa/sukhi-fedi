global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTLP metrics re-exported by the collector (Elixir + Deno OTEL spans → metrics)
  - job_name: otelcol
    static_configs:
      - targets: ["otelcol:8889"]

  # Elixir PromEx — BEAM, Ecto, Oban, Application metrics
  - job_name: elixir
    static_configs:
      - targets: ["elixir:4000"]
    metrics_path: /metrics

  # NATS native Prometheus metrics (exposed on the monitoring http_port)
  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics
