# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Self-contained Coolify compose for a 2 CPU / 12 GiB VPS.
#
# Coolify takes a single compose file path — set this file as the
# "Docker Compose" location for the resource. Do NOT combine with
# docker-compose.yml; this file inlines everything from it and adds
# the Coolify-specific tuning so there's no merge ambiguity.
#
# Coolify owns:
#   - TLS / ingress (Traefik). Set the gateway's public domain in
#     Coolify's UI; it injects the right labels and provisions
#     Let's Encrypt. cloudflared / watchtower are not included here.
#   - Redeploys (git-push webhook). Watchtower is omitted.
#   - Volume management. `postgres_data` and `nats_data` are managed
#     by Coolify; point them at your data disk in the volume panel.
#
# Required env vars (Coolify env panel):
#   DOMAIN                public hostname, e.g. fedi.example.com
#   ERLANG_COOKIE         openssl rand -hex 32
#   SUKHI_REPO_OWNER      e.g. f3liz-casa (defaults to nyanrus)
#   SUKHI_VERSION         e.g. v0  (rolling) or v0.1.35 (pinned)
# Optional:
#   INSTANCE_TITLE        display name
#   ENABLED_ADDONS        comma list or "all"
#   DISABLE_ADDONS        deny list

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sukhi_fedi
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=100
      - -c
      - effective_cache_size=6GB
      - -c
      - wal_buffers=16MB
      - -c
      - max_wal_size=1GB
      - -c
      - min_wal_size=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3G

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  nats-bootstrap:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-nats-bootstrap:${SUKHI_VERSION:-v0}
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    restart: "no"

  # ── Application ──────────────────────────────────────────────────────────────
  gateway:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-gateway:${SUKHI_VERSION:-v0}
    hostname: elixir
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: sukhi_fedi
      DB_POOL_SIZE: "15"
      NATS_HOST: nats
      NATS_PORT: "4222"
      RELEASE_DISTRIBUTION: name
      RELEASE_NODE: gateway@elixir
      RELEASE_COOKIE: ${ERLANG_COOKIE:?set ERLANG_COOKIE to a random secret — openssl rand -hex 32}
      PLUGIN_NODES: api@api
      DOMAIN: ${DOMAIN:-localhost:4000}
      ENABLED_ADDONS: ${ENABLED_ADDONS:-all}
      DISABLE_ADDONS: ${DISABLE_ADDONS:-}
      # +S 2:2 saturates both schedulers; +MBas/+MHas aobf is a
      # cheap binary-heap fragmentation guard for long-running
      # federation nodes.
      ERL_FLAGS: >-
        +S 2:2
        +SDcpu 2:2
        +SDio 4
        +MBas aobf
        +MHas aobf
      ERL_FULLSWEEP_AFTER: "20"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  bun:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-bun:${SUKHI_VERSION:-v0}
    environment:
      NATS_URL: nats://nats:4222
      ENABLED_ADDONS: ${ENABLED_ADDONS:-all}
      DISABLE_ADDONS: ${DISABLE_ADDONS:-}
    depends_on:
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Delivery node ────────────────────────────────────────────────────────
  # Outbound federation: Outbox.Relay (pg-notify → NATS) and Oban
  # `:delivery` / `:federation` queues. Talks to gateway only via
  # Postgres + NATS — no distributed Erlang on this edge.
  delivery:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-delivery:${SUKHI_VERSION:-v0}
    hostname: delivery
    environment:
      DOMAIN: ${DOMAIN:-localhost:4000}
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: sukhi_fedi
      DB_POOL_SIZE: "8"
      NATS_HOST: nats
      NATS_PORT: "4222"
      METRICS_PORT: "4001"
      OBAN_DELIVERY_CONCURRENCY: "10"
      OBAN_FEDERATION_CONCURRENCY: "4"
      FINCH_POOL_SIZE: "50"
      FINCH_POOL_COUNT: "4"
      ERL_FLAGS: >-
        +S 2:2
        +SDcpu 2:2
        +SDio 4
        +MBas aobf
        +MHas aobf
      ERL_FULLSWEEP_AFTER: "20"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
      gateway:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500M

  # ── Plugin API node (distributed Erlang) ─────────────────────────────────
  api:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-api:${SUKHI_VERSION:-v0}
    hostname: api
    environment:
      RELEASE_DISTRIBUTION: name
      RELEASE_NODE: api@api
      RELEASE_COOKIE: ${ERLANG_COOKIE:?set ERLANG_COOKIE to a random secret — openssl rand -hex 32}
      DOMAIN: ${DOMAIN:-localhost:4000}
      INSTANCE_TITLE: ${INSTANCE_TITLE:-sukhi-fedi}
      ENABLED_ADDONS: ${ENABLED_ADDONS:-all}
      DISABLE_ADDONS: ${DISABLE_ADDONS:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  nats_data:
