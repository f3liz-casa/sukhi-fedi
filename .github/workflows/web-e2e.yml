#
# Cross-browser smoke for the SPA. Runs the Playwright flow in `web/e2e`
# against the built app (`vite preview`, no backend) on both Chromium and
# Firefox — the net for "everything was broken in Firefox". Each browser
# is its own matrix leg so a failure points straight at the offending
# engine and the report uploads separately.
name: web-e2e

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-e2e.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run smoke flow (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: web/playwright-report/
          retention-days: 7
