# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Builds and pushes sukhi-fedi container images to GHCR on tag pushes
# matching `v*.*.*`. Each image is tagged with:
#
#   :vX.Y.Z   — immutable
#   :vX.Y     — rolling patch (Watchtower pin for careful operators)
#   :vX       — rolling minor (Watchtower pin for auto-update within major)
#   :latest   — always the newest tag pushed
#
# Operators typically pin to `:v1` in their compose and let Watchtower
# pick up 1.x.y releases automatically; major bumps are opt-in.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: gateway
            context: ./elixir
          - name: delivery
            context: ./delivery
          - name: api
            context: ./api
          - name: bun
            context: ./bun
          - name: nats-bootstrap
            context: ./infra/nats
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sukhi-fedi-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
