# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Builds and pushes sukhi-fedi container images to GHCR on tag pushes
# matching `v*.*.*`. Multi-arch (amd64 + arm64) using GitHub's free
# native runners — QEMU emulation breaks Elixir's mix dets cache, so
# each platform builds on its own native runner and the final tags
# are stitched into one manifest by the merge job.
#
# Tags per image:
#   :vX.Y.Z   — immutable
#   :vX.Y     — rolling patch
#   :vX       — rolling minor
#   :latest   — newest tag pushed
#
# Operators pin :v0 in their compose; Watchtower (or Coolify) picks
# up patch releases automatically. Major bumps are opt-in.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: gateway, context: ./elixir }
          - { name: delivery, context: ./delivery }
          - { name: api, context: ./api }
          - { name: bun, context: ./bun }
          - { name: nats-bootstrap, context: ./infra/nats }
        platform:
          - { name: amd64, runner: ubuntu-24.04, docker: linux/amd64 }
          - { name: arm64, runner: ubuntu-24.04-arm, docker: linux/arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build native, push by digest only (no human-readable tag yet).
      # The merge job stitches per-platform digests into the final
      # multi-arch manifest under the real semver tags.
      - id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          platforms: ${{ matrix.platform.docker }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/sukhi-fedi-${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.name }}
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/sukhi-fedi-${{ matrix.image.name }}:buildcache-${{ matrix.platform.name }}
          cache-to: |
            type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.name }},mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/sukhi-fedi-${{ matrix.image.name }}:buildcache-${{ matrix.platform.name }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.platform.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.name }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: [gateway, delivery, api, bun, nats-bootstrap]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sukhi-fedi-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for f in *; do echo "ghcr.io/${{ github.repository_owner }}/sukhi-fedi-${{ matrix.image }}@$(cat $f)"; done)
