# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Self-hosted stack. Pulls pinned images from GHCR; Watchtower watches
# the `:v1` rolling tag (or whatever SUKHI_VERSION resolves to) and
# redeploys app containers when a new image lands. Stateful services
# (postgres, nats) are *not* labelled — Watchtower leaves them alone.
#
# Operators may set SUKHI_VERSION to a stricter pin (`:v1.2`, `:v1.2.3`)
# to slow the update stream. Dev users can still override any service
# with a local `build:` by supplying a docker-compose.override.yml.
# Cap container log growth and keep a few rotated, gzip'd files. The
# json-file driver is unbounded by default — a real disk-fill risk on a
# small box. The rotated files (/var/lib/docker/containers/*/*-json.log*)
# are what a backup picks up to keep logs off-host. See infra/backup/.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  postgres:
    image: postgres:16-alpine
    logging: *logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sukhi_fedi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    logging: *logging
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats-bootstrap:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-nats-bootstrap:${SUKHI_VERSION:-v1}
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    restart: "no"

  # ── Application ──────────────────────────────────────────────────────────────

  gateway:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-gateway:${SUKHI_VERSION:-v1}
    logging: *logging
    hostname: elixir
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: sukhi_fedi
      DB_POOL_SIZE: "10"
      NATS_HOST: nats
      NATS_PORT: "4222"
      RELEASE_DISTRIBUTION: sname
      RELEASE_NODE: gateway@elixir
      RELEASE_COOKIE: ${ERLANG_COOKIE:-sukhi_fedi_dev_cookie}
      PLUGIN_NODES: api@api
      DOMAIN: ${DOMAIN:-localhost:4000}
      # Addon selection. Comma list of ids, or "all". See docs/ADDONS.md.
      ENABLED_ADDONS: ${ENABLED_ADDONS:-all}
      DISABLE_ADDONS: ${DISABLE_ADDONS:-}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  bun:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-bun:${SUKHI_VERSION:-v1}
    logging: *logging
    environment:
      NATS_URL: nats://nats:4222
      ENABLED_ADDONS: ${ENABLED_ADDONS:-all}
      DISABLE_ADDONS: ${DISABLE_ADDONS:-}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Delivery node ────────────────────────────────────────────────────────
  # Owns the outbound federation side: Outbox.Relay (pg-notify → NATS) and
  # the Oban `:delivery` / `:federation` queues. Talks to the gateway only
  # via Postgres (shared outbox + delivery_receipts tables) and NATS —
  # deliberately no distributed Erlang on this edge.
  delivery:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-delivery:${SUKHI_VERSION:-v1}
    logging: *logging
    hostname: delivery
    environment:
      DOMAIN: ${DOMAIN:-localhost:4000}
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: sukhi_fedi
      DB_POOL_SIZE: "5"
      NATS_HOST: nats
      NATS_PORT: "4222"
      METRICS_PORT: "4001"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
      gateway:
        condition: service_started
    restart: unless-stopped

  # ── Plugin API node (distributed Erlang) ─────────────────────────────────
  # Hosts Mastodon / Misskey REST endpoints as SukhiApi capabilities.
  # Scale capability coverage by adding files under api/lib/sukhi_api/
  # capabilities/, or by running additional specialised nodes with
  # narrower ENABLED_CAPABILITIES.
  api:
    image: ghcr.io/${SUKHI_REPO_OWNER:-nyanrus}/sukhi-fedi-api:${SUKHI_VERSION:-v1}
    logging: *logging
    hostname: api
    environment:
      RELEASE_DISTRIBUTION: sname
      RELEASE_NODE: api@api
      RELEASE_COOKIE: ${ERLANG_COOKIE:-sukhi_fedi_dev_cookie}
      DOMAIN: ${DOMAIN:-localhost:4000}
      INSTANCE_TITLE: ${INSTANCE_TITLE:-sukhi-fedi}
      ENABLED_ADDONS: ${ENABLED_ADDONS:-all}
      DISABLE_ADDONS: ${DISABLE_ADDONS:-}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped

  # ── Anubis: PoW gate in front of /login ──────────────────────────────────
  # Sits between the edge and the gateway. Only `/login` is challenged —
  # everything else (federation, API, OAuth, static) is ALLOW-listed in
  # config/anubis/botPolicies.yaml so SPA fetches and ActivityPub
  # delivery keep working. See docs/anubis.md for the rationale.
  #
  # The edge (Coolify, nginx, host) should now route HTTP traffic to
  # this service on port 8080 instead of `gateway:4000`. Anubis itself
  # proxies through to `gateway:4000`.
  anubis:
    image: ghcr.io/techarohq/anubis:latest
    logging: *logging
    environment:
      BIND: ":8080"
      DIFFICULTY: "4"
      METRICS_BIND: ":9090"
      POLICY_FNAME: /data/cfg/botPolicies.yaml
      SERVE_ROBOTS_TXT: "true"
      TARGET: http://gateway:4000
      # challenge ページの下に出る連絡先。通れない人に届くように。
      # Anubis のバージョンで env 名が変わることがある(IMPRINT_FILE /
      # POLICY_IMPRINT_FILE) ─ 起動後にページを開いて出ているか確認。
      IMPRINT_FILE: /data/cfg/imprint.md
      # 32-byte hex. Generate once with:
      #   openssl rand -hex 32
      # then put it in `.env` as ANUBIS_ED25519_KEY=... so cookies
      # signed before a restart still verify after.
      ED25519_PRIVATE_KEY_HEX: ${ANUBIS_ED25519_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_PARTITIONED: "true"
    volumes:
      - ./config/anubis:/data/cfg:ro
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped

  # ── Watchtower: drop-in image upgrades ───────────────────────────────────
  # Polls GHCR for new images on the pinned tag; recreates containers
  # on change. Only services with the watchtower label are touched —
  # postgres and nats are explicitly left alone.
  watchtower:
    image: containrrr/watchtower:latest
    logging: *logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-3600}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
