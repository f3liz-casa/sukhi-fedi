services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sukhi_fedi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats-bootstrap:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./infra/nats/bootstrap.sh:/bootstrap.sh:ro
    command: ["sh", "/bootstrap.sh"]
    restart: "no"

  # ── Observability (Prometheus + Grafana, Elixir-native telemetry only) ───────
  #
  # OpenTelemetry / Jaeger were removed in favor of PromEx + telemetry_metrics
  # for lighter weight. Structured logs cover what traces used to.

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  # ── Application ──────────────────────────────────────────────────────────────

  elixir:
    build:
      context: ./elixir
    hostname: elixir
    ports:
      - "4000:4000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: sukhi_fedi
      DB_POOL_SIZE: "10"
      NATS_HOST: nats
      NATS_PORT: "4222"
      # Distributed Erlang — cluster with api for plugin :rpc.
      RELEASE_DISTRIBUTION: name
      RELEASE_NODE: gateway@elixir
      RELEASE_COOKIE: ${ERLANG_COOKIE:-sukhi_fedi_dev_cookie}
      PLUGIN_NODES: api@api
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully

  deno:
    build:
      context: ./deno
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully

  # ── Plugin API node (distributed Erlang) ─────────────────────────────────
  # Hosts Mastodon / Misskey REST endpoints as SukhiApi capabilities.
  # Scale capability coverage by adding files under api/lib/sukhi_api/
  # capabilities/, or by running additional specialised nodes with
  # narrower ENABLED_CAPABILITIES.
  api:
    build:
      context: ./api
    hostname: api
    environment:
      RELEASE_DISTRIBUTION: name
      RELEASE_NODE: api@api
      RELEASE_COOKIE: ${ERLANG_COOKIE:-sukhi_fedi_dev_cookie}
      DOMAIN: localhost:4000
      INSTANCE_TITLE: sukhi-fedi

volumes:
  postgres_data:
  nats_data:
  prometheus_data:
  grafana_data:
